name = "glados-discourse-bot"
main = "worker.js"
compatibility_date = "2026-04-30"
workers_dev = true
# Cloudflare GitHub 自动部署时保留 Dashboard 中已配置的 BOT_TOKEN / ADMIN_ID 等变量
keep_vars = true

[[kv_namespaces]]
binding = "GLADOS_DB"

[triggers]
# 每小时执行签到；每五分钟仅在 BOT_TOKEN 变化时自动重设 webhook。
crons = ["0 * * * *", "*/5 * * * *"]

