name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main]
    paths: [worker.js]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy worker.js
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          KV_NS_ID: ${{ secrets.KV_NS_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
        run: |
          set -euo pipefail
          test -n "$CF_API_TOKEN"
          test -n "$CF_ACCOUNT_ID"
          test -n "$KV_NS_ID"
          test -n "$BOT_TOKEN"
          test -n "$ADMIN_ID"

          # 将 Telegram 配置作为 secret_text binding 一起上传，避免每次部署后在 Cloudflare 重填。
          jq -n \
            --arg kv "$KV_NS_ID" \
            --arg bot "$BOT_TOKEN" \
            --arg admin "$ADMIN_ID" \
            '{main_module:"worker.js",compatibility_date:"2026-04-30",bindings:[
              {name:"GLADOS_DB",type:"kv_namespace",namespace_id:$kv},
              {name:"BOT_TOKEN",type:"secret_text",text:$bot},
              {name:"ADMIN_ID",type:"secret_text",text:$admin}
            ]}' > /tmp/worker-metadata.json

          curl --fail-with-body -sS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/glados-bot" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -F "metadata=@/tmp/worker-metadata.json;type=application/json" \
            -F "worker.js=@worker.js;type=application/javascript+module"
